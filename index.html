<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Hunter: Neon Horizon</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-container">
        <div id="score-board">
            Score: <span id="score">0</span>
        </div>
        <div id="health-board">
            Health: <div id="health-bar"><div id="health-fill"></div></div>
        </div>
        <div id="game-over-screen" class="hidden">
            <h1>Game Over</h1>
            <p>Final Score: <span id="final-score">0</span></p>
            <button id="restart-btn">Restart Journey</button>
        </div>
        <div id="start-screen">
            <h1>Space Hunter: Neon Horizon</h1>
            <p>WASD to Move | Mouse/Space to Aim & Shoot</p>
            <button id="start-btn">Start Mission</button>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
    
    <script src="script.js"></script>
</body>
</html>
